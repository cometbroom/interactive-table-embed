<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Exercise Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .example-row textarea[readonly] {
            background-color: #1f2937;
            color: #fbbf24;
            cursor: not-allowed;
        }

        .example-row {
            background-color: #1f2937;
        }

        .table-shell {
            max-width: 100%;
            overflow-x: auto;
        }

        table {
            min-width: 100%;
        }

        th,
        td {
            position: relative;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        textarea.cell-input {
            box-sizing: border-box;
            display: block;
            min-height: 2rem;
            min-height: fit-content;
            overflow: hidden;
            resize: none;
            white-space: pre-wrap;
        }

        .column-resize-handle,
        .row-resize-handle {
            position: absolute;
            z-index: 10;
            opacity: 0;
            transition: opacity 120ms ease, background-color 120ms ease;
        }

        .column-resize-handle {
            top: 0;
            right: -3px;
            width: 8px;
            height: 100%;
            cursor: col-resize;
        }

        .row-resize-handle {
            right: 0;
            bottom: -3px;
            left: 0;
            height: 8px;
            cursor: row-resize;
        }

        th:hover .column-resize-handle,
        tr:hover .row-resize-handle,
        .column-resize-handle.is-active,
        .row-resize-handle.is-active {
            opacity: 1;
        }

        .column-resize-handle::after {
            content: "";
            position: absolute;
            top: 0.45rem;
            right: 3px;
            bottom: 0.45rem;
            width: 2px;
            border-radius: 999px;
            background: #10b981;
        }

        .row-resize-handle::after {
            content: "";
            position: absolute;
            right: 0.5rem;
            bottom: 3px;
            left: 0.5rem;
            height: 2px;
            border-radius: 999px;
            background: #10b981;
        }
    </style>
</head>

<body class="bg-zinc-950 text-zinc-200 p-6">
    <div class="max-w-6xl mx-auto">
        <!-- Dynamic Header -->
        <div class="mb-2">
            <div class="flex items-center justify-between">
                <div>
                    <h1 id="tableTitle" class="text-2xl font-semibold tracking-tight"></h1>
                    <p id="tableSubtitle" class="text-zinc-400"></p>
                    <div class="mt-1 text-xs text-zinc-500 flex items-center gap-2">
                        <i class="fa-solid fa-info-circle"></i>
                        <span>Answers are saved automatically in this browser</span>
                    </div>
                </div>
                <div class="flex items-center gap-2">

                    <button onclick="resetToTemplate()"
                        class="flex items-center gap-2 px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-600 rounded-2xl text-sm font-medium transition-all">
                        <i class="fa-solid fa-undo"></i>
                        <span>Reset</span>
                    </button>

                    <button onclick="exportCSV()"
                        class="flex items-center gap-2 px-4 py-1.5 bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-600 rounded-2xl text-sm font-medium transition-all">
                        <i class="fa-solid fa-download"></i>
                        <span>CSV</span>
                    </button>
                </div>
            </div>


        </div>

        <!-- Table -->
        <div class="table-shell bg-zinc-900 border border-zinc-800 rounded-l shadow-l">
            <table class="w-full table-fixed border-collapse">
                <colgroup id="tableColumns"></colgroup>
                <thead id="tableHead" class="bg-zinc-950 border-b text-sm border-zinc-800"></thead>
                <tbody id="tableBody" class="divide-y divide-zinc-800 text-sm"></tbody>
            </table>
        </div>

        <div class="mt-2 flex justify-between items-center text-xs text-zinc-500 px-1">
            <div class="text-emerald-500/70">Auto-saved • Private to your browser</div>
        </div>
    </div>

    <script>
        // =============================================
        // DEFAULT CONFIG (can be overridden via ?config=... query param)
        // =============================================
        const defaultConfig = {
            subtitle: "Fill in the blank rows below",
            columns: ['concept', 'definition', 'example', 'notes'],
            labels: {
                concept: 'Concept',
                definition: 'Definition / Explanation',
                example: 'Example',
                notes: 'Your Notes / Reflection'
            },
            example: {
                concept: 'Growth Mindset',
                definition: 'The belief that abilities and intelligence can be developed through dedication, hard work, and learning from mistakes.',
                example: 'A student who says "I can\'t do math" changes to "I can\'t do math yet — I need more practice."',
                notes: 'Carol Dweck\'s research. Very useful for learning new skills.'
            },
            rowHeaderLabel: '',
            rowHeaders: [],
            blankRows: 5,
            storageKey: 'exerciseTable_v1'
        };

        // =============================================
        // LOAD CONFIG FROM URL QUERY PARAMETER
        // =============================================
        const MIN_COLUMN_WIDTH = 72;
        let config = { ...defaultConfig };

        function loadConfigFromURL() {
            const params = new URLSearchParams(window.location.search);

            if (params.has('config')) {
                try {
                    const raw = decodeURIComponent(params.get('config'));
                    const userConfig = JSON.parse(raw);

                    // Merge top-level
                    if (userConfig.title) config.title = userConfig.title;
                    if (userConfig.subtitle) config.subtitle = userConfig.subtitle;
                    if (userConfig.storageKey) config.storageKey = userConfig.storageKey;
                    if (typeof userConfig.rowHeaderLabel === 'string') config.rowHeaderLabel = userConfig.rowHeaderLabel;
                    if (typeof userConfig.blankRows === 'number') config.blankRows = userConfig.blankRows;

                    // Merge columns array
                    if (Array.isArray(userConfig.columns) && userConfig.columns.length > 0) {
                        config.columns = userConfig.columns;
                    }

                    if (Array.isArray(userConfig.rowHeaders)) {
                        config.rowHeaders = userConfig.rowHeaders;
                    }

                    // Deep merge labels
                    if (userConfig.labels && typeof userConfig.labels === 'object') {
                        config.labels = { ...config.labels, ...userConfig.labels };
                    }

                    // Deep merge example
                    if (userConfig.example && typeof userConfig.example === 'object') {
                        config.example = { ...config.example, ...userConfig.example };
                    }

                    console.log('%c[Exercise Table] Custom config loaded from URL', 'color:#22c55e');
                } catch (e) {
                    console.warn('%c[Exercise Table] Invalid config in URL. Using defaults.', 'color:#f59e0b', e);
                }
            }
        }

        // Call immediately
        loadConfigFromURL();

        // Apply dynamic title/subtitle
        function applyHeader() {
            document.getElementById('tableSubtitle').textContent = config.subtitle;
            document.title = config.title || 'Interactive Exercise Table';
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeCSVValue(value) {
            let val = String(value ?? '');

            if (val.includes(',') || val.includes('"') || val.includes('\n') || val.includes('\r')) {
                val = `"${val.replace(/"/g, '""')}"`;
            }

            return val;
        }

        function hasRowHeaders() {
            return Array.isArray(config.rowHeaders) && config.rowHeaders.length > 0;
        }

        function getRowHeader(index) {
            if (!hasRowHeaders()) return '';

            return config.rowHeaders[index] ?? '';
        }

        function getLayoutKey() {
            return `${config.storageKey}_layout`;
        }

        function loadLayout() {
            try {
                return JSON.parse(localStorage.getItem(getLayoutKey())) || {};
            } catch (e) {
                return {};
            }
        }

        function saveLayout(patch) {
            localStorage.setItem(getLayoutKey(), JSON.stringify({ ...loadLayout(), ...patch }));
        }

        function getColumnCount() {
            return config.columns.length + (hasRowHeaders() ? 1 : 0);
        }

        function getColumns() {
            return Array.from(document.querySelectorAll('#tableColumns col'));
        }

        function getColumnPixelWidths() {
            const headerCells = Array.from(document.querySelectorAll('#tableHead th'));
            return headerCells.map(cell => Math.round(cell.getBoundingClientRect().width));
        }

        function applyColumnWidths(widths) {
            const cols = getColumns();
            if (!Array.isArray(widths) || widths.length !== cols.length) return;

            widths.forEach((width, index) => {
                cols[index].style.width = `${Math.max(MIN_COLUMN_WIDTH, Number(width) || MIN_COLUMN_WIDTH)}px`;
            });

            scheduleAutosizeAllCells();
        }

        function getInitialColumnWidths(weights) {
            const tableShell = document.querySelector('.table-shell');
            const columnCount = weights.length || 1;
            const minTableWidth = columnCount * MIN_COLUMN_WIDTH;
            const availableWidth = tableShell ? tableShell.clientWidth : minTableWidth;
            const targetWidth = Math.max(minTableWidth, availableWidth);
            const totalWeight = weights.reduce((sum, weight) => sum + weight, 0) || columnCount;
            const extraWidth = targetWidth - minTableWidth;

            return weights.map(weight => MIN_COLUMN_WIDTH + (extraWidth * weight / totalWeight));
        }

        function autosizeTextarea(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = `${Math.max(32, textarea.scrollHeight + 2)}px`;
        }

        function autosizeAllCells() {
            const rows = Array.from(document.querySelectorAll('#tableBody tr'));

            rows.forEach(row => {
                row.style.height = 'auto';
            });

            document.querySelectorAll('textarea.cell-input').forEach(autosizeTextarea);

            rows.forEach((row, index) => {
                const storedRowHeight = getRowHeight(index);
                if (!storedRowHeight) return;

                const naturalHeight = Math.ceil(row.getBoundingClientRect().height);
                row.style.height = `${Math.max(storedRowHeight, naturalHeight)}px`;
            });
        }

        function scheduleAutosizeAllCells() {
            autosizeAllCells();
            requestAnimationFrame(() => {
                autosizeAllCells();
                requestAnimationFrame(autosizeAllCells);
            });
            setTimeout(autosizeAllCells, 60);
            setTimeout(autosizeAllCells, 180);
        }

        function getRowHeight(index) {
            const layout = loadLayout();
            return Array.isArray(layout.rowHeights) ? layout.rowHeights[index] : null;
        }

        function setStoredRowHeight(index, height) {
            const rowHeights = Array.isArray(loadLayout().rowHeights)
                ? [...loadLayout().rowHeights]
                : [];

            rowHeights[index] = height;
            saveLayout({ rowHeights });
        }

        // Build dynamic table header
        function renderColumnWidths() {
            const colgroup = document.getElementById('tableColumns');
            colgroup.innerHTML = '';

            const weights = config.columns.map(col => {
                const value = config.example && Object.prototype.hasOwnProperty.call(config.example, col)
                    ? config.example[col]
                    : '';

                return Math.max(String(value ?? '').length, 4);
            });

            if (hasRowHeaders()) {
                const rowHeaderWeight = [config.rowHeaderLabel, ...config.rowHeaders]
                    .reduce((max, value) => Math.max(max, String(value ?? '').length), 4);

                weights.unshift(rowHeaderWeight);
            }

            const table = colgroup.closest('table');
            if (table) table.style.minWidth = `${weights.length * MIN_COLUMN_WIDTH}px`;

            getInitialColumnWidths(weights).forEach((width, index) => {
                const col = document.createElement('col');
                col.dataset.index = index;
                col.style.width = `${width}px`;
                colgroup.appendChild(col);
            });

            const savedWidths = loadLayout().columnWidths;
            if (Array.isArray(savedWidths) && savedWidths.length === getColumnCount()) {
                requestAnimationFrame(() => applyColumnWidths(savedWidths));
            }
        }

        function renderHeader() {
            const thead = document.getElementById('tableHead');
            thead.innerHTML = '';

            const tr = document.createElement('tr');
            tr.className = 'bg-zinc-950 border-zinc-800';

            // Row number column
            let html = ``;

            if (hasRowHeaders()) {
                html += `<th class="px-2 py-4 text-left text-xs font-semibold tracking-wider text-zinc-300">${escapeHtml(config.rowHeaderLabel)}<span class="column-resize-handle" data-column-index="0" title="Drag to resize column"></span></th>`;
            }

            // Dynamic columns
            config.columns.forEach((col, index) => {
                const label = config.labels[col] || col;
                const columnIndex = index + (hasRowHeaders() ? 1 : 0);
                html += `<th class="px-2 py-4 text-left text-xs font-semibold tracking-wider text-zinc-300">${escapeHtml(label)}<span class="column-resize-handle" data-column-index="${columnIndex}" title="Drag to resize column"></span></th>`;
            });

            tr.innerHTML = html;
            thead.appendChild(tr);
        }

        let data = [];

        function getTemplateData() {
            const template = [{ ...config.example }];

            for (let i = 0; i < config.blankRows; i++) {
                const blank = {};
                config.columns.forEach(col => blank[col] = '');
                template.push(blank);
            }
            return template;
        }

        function loadData() {
            const saved = localStorage.getItem(config.storageKey);

            if (saved) {
                try {
                    data = JSON.parse(saved);

                    // Always ensure first row matches current example
                    if (data.length > 0) {
                        data[0] = { ...config.example };
                    } else {
                        data = getTemplateData();
                    }
                } catch (e) {
                    console.warn('Could not parse saved data, resetting.');
                    data = getTemplateData();
                }
            } else {
                data = getTemplateData();
            }

            saveData();
            renderTable();
        }

        function saveData() {
            localStorage.setItem(config.storageKey, JSON.stringify(data));
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach((row, index) => {
                const isExample = index === 0;

                const tr = document.createElement('tr');
                tr.className = isExample
                    ? 'example-row group'
                    : 'hover:bg-zinc-800/40 group transition-colors';

                const storedRowHeight = getRowHeight(index);
                if (storedRowHeight) tr.style.height = `${storedRowHeight}px`;

                let html = ``;

                if (hasRowHeaders()) {
                    html += `<th scope="row" class="px-2 py-2 text-left text-xs font-semibold text-zinc-400 whitespace-pre-wrap align-middle">${escapeHtml(getRowHeader(index))}</th>`;
                }

                // Dynamic cells
                config.columns.forEach((col, colIndex) => {
                    const value = row[col] || '';
                    const isReadonly = isExample;
                    const resizeHandle = colIndex === config.columns.length - 1
                        ? `<span class="row-resize-handle" data-row-index="${index}" title="Drag to resize row"></span>`
                        : '';

                    html += `
                        <td class="px-1 py-1 align-top">
                            <textarea
                                ${isReadonly ? 'readonly' : ''}
                                class="cell-input w-full bg-transparent border border-transparent ${isReadonly
                            ? 'text-amber-300 placeholder-amber-700/50'
                            : 'hover:border-zinc-700 focus:border-emerald-500 focus:bg-zinc-950'} 
                                   px-1 py-1 text-xs leading-5 outline-none transition-all placeholder:text-zinc-600"
                                placeholder="${isReadonly ? '' : 'Type here...'}"
                                oninput="updateCell(${index}, '${col}', this.value); scheduleAutosizeAllCells()"
                            >${escapeHtml(value)}</textarea>
                            ${resizeHandle}
                        </td>
                    `;
                });

                tr.innerHTML = html;
                tbody.appendChild(tr);
            });

            scheduleAutosizeAllCells();
        }

        function updateCell(rowIndex, column, value) {
            data[rowIndex][column] = value;
            saveData();
        }

        function resetToTemplate() {
            if (!confirm('Reset everything to the original template?')) return;
            data = getTemplateData();
            saveData();
            renderTable();
        }

        function exportCSV() {
            if (data.length === 0) return alert('No data to export!');

            const headerValues = config.columns.map(c => escapeCSVValue(config.labels[c] || c));
            if (hasRowHeaders()) headerValues.unshift(escapeCSVValue(config.rowHeaderLabel || 'Row'));

            let csv = headerValues.join(',') + '\n';

            data.forEach((row, idx) => {
                const values = config.columns.map(col => escapeCSVValue(row[col]));

                if (hasRowHeaders()) values.unshift(escapeCSVValue(getRowHeader(idx)));

                csv += values.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = ((config.title || 'table').toLowerCase().replace(/\s+/g, '-') || 'table') + '-answers.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Keyboard support
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') document.activeElement.blur();
        });

        window.addEventListener('resize', scheduleAutosizeAllCells);

        document.addEventListener('pointerdown', function (e) {
            const columnHandle = e.target.closest('.column-resize-handle');
            if (columnHandle) {
                startColumnResize(e, Number(columnHandle.dataset.columnIndex), columnHandle);
                return;
            }

            const rowHandle = e.target.closest('.row-resize-handle');
            if (rowHandle) {
                startRowResize(e, Number(rowHandle.dataset.rowIndex), rowHandle);
            }
        });

        function startColumnResize(e, columnIndex, handle) {
            e.preventDefault();

            const cols = getColumns();
            const widths = getColumnPixelWidths();
            const neighborIndex = columnIndex < cols.length - 1 ? columnIndex + 1 : columnIndex - 1;
            if (!cols[columnIndex] || !cols[neighborIndex]) return;

            const startX = e.clientX;
            const startCurrent = widths[columnIndex];
            const startNeighbor = widths[neighborIndex];
            const minWidth = MIN_COLUMN_WIDTH;

            handle.classList.add('is-active');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';

            function onMove(moveEvent) {
                const rawDelta = moveEvent.clientX - startX;
                const delta = Math.min(startNeighbor - minWidth, Math.max(minWidth - startCurrent, rawDelta));

                widths[columnIndex] = startCurrent + delta;
                widths[neighborIndex] = startNeighbor - delta;
                applyColumnWidths(widths);
            }

            function onUp() {
                handle.classList.remove('is-active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                saveLayout({ columnWidths: getColumnPixelWidths() });
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
            }

            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup', onUp);
        }

        function startRowResize(e, rowIndex, handle) {
            e.preventDefault();

            const row = document.querySelectorAll('#tableBody tr')[rowIndex];
            if (!row) return;

            const startY = e.clientY;
            const startHeight = row.getBoundingClientRect().height;
            const minHeight = 40;

            handle.classList.add('is-active');
            document.body.style.cursor = 'row-resize';
            document.body.style.userSelect = 'none';

            function onMove(moveEvent) {
                row.style.height = `${Math.max(minHeight, startHeight + moveEvent.clientY - startY)}px`;
            }

            function onUp() {
                handle.classList.remove('is-active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                setStoredRowHeight(rowIndex, Math.round(row.getBoundingClientRect().height));
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
            }

            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup', onUp);
        }

        // Initialize everything
        function init() {
            applyHeader();
            renderColumnWidths();
            renderHeader();
            loadData();
            if (document.fonts) document.fonts.ready.then(scheduleAutosizeAllCells);
            setTimeout(scheduleAutosizeAllCells, 0);

            // Helpful console message for power users
            console.log('%c[Exercise Table] Ready. Pass config via ?config={"columns":[...],"labels":{...},"example":{...},"blankRows":5}', 'color:#64748b');
        }

        window.onload = init;
    </script>
</body>

</html>
